name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  php-tests:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: kuras_test
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      TEST_DB_DSN: mysql:host=127.0.0.1;port=3306;dbname=kuras_test;charset=utf8mb4
      TEST_DB_USER: root
      TEST_DB_PASS: root
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, zip, pdo_mysql
          coverage: none
      - run: composer validate --strict --no-check-lock
      - run: composer install --no-interaction --prefer-dist
      - run: php tests/bootstrap-database.php
      - run: composer check

  static-site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, zip
          coverage: none
      - run: composer install --no-interaction --prefer-dist
      - name: Build from the sanitized LEA fixture
        run: php bin/build-static.php --file=tests/Fixtures/lea_prices_valid.xlsx --source-date=2026-07-17 --fixture --output=dist --archive-output=var/import-artifact
      - name: Verify generated public files
        run: test -s dist/index.html && test -s dist/data/current.json && test -s dist/data/current.js && test -s dist/data/import-report.json && test -s var/import-artifact/import-report.json
